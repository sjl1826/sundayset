<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sunday Worship Set</title>
<style>
  :root {
    --bg: #f6f9fc;
    --panel: #ffffff;
    --ink: #0a1b2a;
    --muted: #5b7186;
    --line: #e6ecf2;
    --accent: #4da2ff;
    --accent-dark: #011829;
    --accent-soft: #eaf4ff;
    --radius: 20px;
    --shadow: 0 1px 2px rgba(10,27,42,.04), 0 12px 40px rgba(10,27,42,.06);
    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -200px, #eaf4ff 0%, rgba(234,244,255,0) 60%),
      var(--bg);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 56px 28px 96px;
  }

  /* ---------- Header ---------- */
  header.hero {
    text-align: center;
    margin-bottom: 56px;
  }
  .eyebrow {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid #d5e9ff;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  h1.band-name {
    font-size: clamp(40px, 8vw, 76px);
    line-height: 1.02;
    letter-spacing: -0.03em;
    font-weight: 800;
    margin: 0 0 12px;
    background: linear-gradient(180deg, #0a1b2a 0%, #2a4a68 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .date {
    font-size: 18px;
    color: var(--muted);
    font-weight: 500;
  }
  [contenteditable]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
    border-radius: 8px;
  }

  /* ---------- Section titles ---------- */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 20px;
  }

  /* ---------- Members ---------- */
  .members {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 64px;
  }
  .member {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .photo {
    width: 92px;
    height: 92px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(160deg, #eaf4ff, #d5e9ff);
    background-size: cover;
    background-position: center;
    border: 1px solid #d5e9ff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .photo .hint { padding: 0 8px; }
  .member .name {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  .member .role {
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .member .role .icon { font-size: 15px; }

  /* ---------- Table of contents ---------- */
  .toc {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 26px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 64px;
  }
  .toc ol {
    margin: 0;
    padding: 0;
    list-style: none;
    counter-reset: toc;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 6px 24px;
  }
  .toc li { counter-increment: toc; }
  .toc a {
    display: flex;
    align-items: baseline;
    gap: 12px;
    text-decoration: none;
    color: var(--ink);
    padding: 10px 8px;
    border-radius: 10px;
    border-bottom: 1px solid var(--line);
    transition: background .15s;
  }
  .toc a:hover { background: var(--accent-soft); }
  .toc a::before {
    content: counter(toc, decimal-leading-zero);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
    min-width: 24px;
  }
  .toc .toc-key {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ---------- Songs ---------- */
  .songs { display: grid; gap: 24px; }
  .song {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    scroll-margin-top: 24px;
  }
  .song-head {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 26px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .song-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid #d5e9ff;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: none;
    font-variant-numeric: tabular-nums;
  }
  .song-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 2px solid transparent;
  }
  a.song-title:hover { border-bottom-color: var(--accent); color: var(--accent); }
  .song-title-link { display: inline-flex; align-items: center; gap: 8px; }
  .link-btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--muted);
    border-radius: 8px;
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }
  .song-meta {
    margin-left: auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: #f2f6fa;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
  }
  .chip .label {
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: 11px;
  }
  .chip .val { min-width: 20px; }

  .chords-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 18px 26px 0;
  }
  .chords {
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    padding: 12px 26px 26px;
    color: #142a3d;
    min-height: 90px;
  }
  .chords:empty::before {
    content: "Paste your chords / lyrics here…";
    color: #a9b8c6;
  }

  /* ---------- Toolbar ---------- */
  .toolbar {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 50;
  }

  /* ---------- Date picker ---------- */
  .datebar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 40px;
  }
  .datebar label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .datebar select {
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
  }
  .datebar select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .btn {
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    border-radius: 12px;
    padding: 10px 18px;
    cursor: pointer;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: transform .12s, background .15s;
  }
  .btn:hover { background: var(--accent-soft); }
  .btn.primary {
    background: var(--accent-dark);
    color: #fff;
    border-color: var(--accent-dark);
  }
  .btn.primary:hover { background: #0a2740; }

  .footnote {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 56px;
  }

  /* ---------- Print / PDF ---------- */
  /* ---------- Auto-scroll controller ---------- */
  .scroller {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 60;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 10px 12px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .scroller .grip {
    cursor: grab;
    color: #b9c6d3;
    font-size: 18px;
    line-height: 1;
    padding: 0 2px;
  }
  .scroller.dragging .grip { cursor: grabbing; }
  .scroller .play {
    border: none;
    background: var(--accent-dark);
    color: #fff;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scroller .play.on { background: var(--accent); }
  .scroller .speed-wrap { display: flex; flex-direction: column; align-items: center; }
  .scroller .speed {
    width: 58px;
    text-align: center;
    font-family: var(--font);
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px 4px;
    font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .scroller .speed:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .scroller .speed::-webkit-outer-spin-button,
  .scroller .speed::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .scroller .lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ---------- Profile modal ---------- */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(10, 27, 42, .45);
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .modal.open { display: flex; }
  .modal-card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: 0 30px 80px rgba(10, 27, 42, .25);
    padding: 44px 48px 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .modal-photo {
    width: 240px;
    height: 240px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    background-color: var(--accent-soft);
    border: 1px solid #d5e9ff;
  }
  .modal-name {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .modal-role {
    margin-top: 8px;
    font-size: 17px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .modal-role .icon { font-size: 19px; }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    color: var(--muted);
  }
  .modal-close:hover { color: var(--ink); }

  @media print {
    :root { --shadow: none; }
    /* Force photos and colored chips to actually print (no "Background graphics" checkbox needed) */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff; }
    .toolbar { display: none !important; }
    .datebar { display: none !important; }
    .scroller { display: none !important; }
    .modal { display: none !important; }
    .wrap { padding: 0; max-width: 100%; }
    .photo .hint { display: none; }
    .member, .toc, .song { break-inside: avoid; box-shadow: none; }
    .song { break-inside: avoid-page; }
    a { color: inherit; text-decoration: none; }
    .link-btn { display: none !important; }
    [contenteditable]:focus { outline: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn primary" onclick="window.print()">Export to PDF</button>
</div>

<div class="wrap">

  <!-- SETLIST PICKER -->
  <div class="datebar">
    <label for="setPicker">Set list</label>
    <select id="setPicker"></select>
  </div>

  <!-- HERO -->
  <header class="hero">
    <span class="eyebrow" contenteditable="true" data-save="eyebrow">Setlist</span>
    <h1 class="band-name" contenteditable="true" data-save="band-name">Our Band Name</h1>
    <div class="date" contenteditable="true" data-save="date">Friday · July 2, 2026</div>
  </header>

  <!-- MEMBERS -->
  <p class="section-title">The Band</p>
  <div class="members" id="members"></div>

  <!-- TABLE OF CONTENTS -->
  <p class="section-title">Setlist · Table of Contents</p>
  <nav class="toc">

  <!-- SONGS -->
  <p class="section-title">Songs</p>
  <div class="songs" id="songs"></div>

  <p class="footnote">Click any text to edit it · Click a photo circle to add a picture · Click 🔗 to set a song link · then “Export to PDF”.</p>
</div>

<!-- Profile modal: bigger view of a band member -->
<div class="modal" id="profileModal">
  <div class="modal-card">

    <div class="modal-photo" id="modalPhoto"></div>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-role" id="modalRole"></div>
  </div>
</div>

=="};

  const SONG_COUNT = 7;

  /* ---------------- Members ---------------- */
  const membersEl = document.getElementById("members");
  members.forEach((m, idx) => {
    const card = document.createElement("div");
    card.className = "member";
    const src = PHOTOS[m.name] || "";
    const styleAttr = src ? ` style="background-image:url('${src}')"` : "";
    const hint = src ? "" : '<span class="hint">Add photo</span>';
    card.innerHTML = `
      <div class="photo" data-idx="${idx}" title="Click to view profile"${styleAttr}>${hint}</div>
      <div class="name" contenteditable="true" data-save="m-name-${idx}">${m.name}</div>
      <div class="role"><span class="icon">${m.icon}</span><span contenteditable="true" data-save="m-role-${idx}">${m.role}</span></div>
    `;
    membersEl.appendChild(card);
  });

  /* ---------------- Songs + TOC ---------------- */
  const songsEl = document.getElementById("songs");
  const tocEl = document.getElementById("toc");
  const pad = (n) => String(n).padStart(2, "0");

  for (let i = 1; i <= SONG_COUNT; i++) {
    const id = "song-" + i;

    // TOC entry
    const li = document.createElement("li");
    li.innerHTML = `
      <a href="#${id}">
        <span class="toc-title" data-song="${i}">Song ${i}</span>
        <span class="toc-key" data-key="${i}">—</span>
      </a>`;
    tocEl.appendChild(li);

    // Song card
    const song = document.createElement("section");
    song.className = "song";
    song.id = id;
    song.innerHTML = `
      <div class="song-head">
        <div class="song-num">${pad(i)}</div>
        <div class="song-title-link">
          <a class="song-title" href="#" target="_blank" rel="noopener" data-title="${i}" data-save="song-title-${i}" contenteditable="true"
             onclick="if(this.getAttribute('href')==='#'){return false;}">Song Title ${i}</a>
          <button class="link-btn" title="Set link" onclick="setLink(${i})">🔗</button>
        </div>
        <div class="song-meta">
          <span class="chip"><span class="label">Key</span><span class="val" contenteditable="true" data-keyval="${i}" data-save="song-key-${i}">C</span></span>
          <span class="chip"><span class="label">Singer</span><span class="val" contenteditable="true" data-save="song-singer-${i}">Name</span></span>
        </div>
      </div>
      <div class="chords-label">Chords / Lyrics</div>
      <div class="chords" contenteditable="true" data-save="song-chords-${i}"></div>
    `;
    songsEl.appendChild(song);
  }

  /* ---------------- Sync TOC with song titles + key ---------------- */
  function syncToc() {
    for (let i = 1; i <= SONG_COUNT; i++) {
      const title = document.querySelector(`[data-title="${i}"]`).textContent.trim();
      const key = document.querySelector(`[data-keyval="${i}"]`).textContent.trim();
      document.querySelector(`[data-song="${i}"]`).textContent = title || ("Song " + i);
      document.querySelector(`[data-key="${i}"]`).textContent = key ? ("Key of " + key) : "—";
    }
  }
  document.addEventListener("input", syncToc);
  syncToc();

  /* ---------------- State helpers (used by the date picker) ---------------- */
  function collectState() {
    const s = { text: {}, photos: {}, links: {} };
    document.querySelectorAll("[data-save]").forEach((el) => { s.text[el.dataset.save] = el.innerHTML; });
    document.querySelectorAll(".photo[data-idx]").forEach((el) => { s.photos[el.dataset.idx] = el.style.backgroundImage || ""; });
    document.querySelectorAll("a.song-title[data-title]").forEach((a) => { s.links[a.dataset.title] = a.getAttribute("href"); });
    return s;
  }

  function applyState(s) {
    if (!s) return;
    if (s.text) Object.entries(s.text).forEach(([k, v]) => {
      const el = document.querySelector(`[data-save="${k}"]`);
      if (el) el.innerHTML = v;
    });
    if (s.photos) Object.entries(s.photos).forEach(([k, v]) => {
      const el = document.querySelector(`.photo[data-idx="${k}"]`);
      if (el && v) { el.style.backgroundImage = v; const h = el.querySelector(".hint"); if (h) h.style.display = "none"; }
    });
    if (s.links) Object.entries(s.links).forEach(([k, v]) => {
      const a = document.querySelector(`a.song-title[data-title="${k}"]`);
      if (a && v) { a.setAttribute("href", v); if (v !== "#") a.title = "Opens: " + v; }
    });
    syncToc();
  }

  /* ---------------- Set list picker: choose a stored set to load ---------------- */
  const SETS = window.PROJECT_SETS || {};   // { "<id>": savedState }, baked in at build time
  const DEFAULT_STATE = collectState();     // the blank template layout to fall back to
  const picker = document.getElementById("setPicker");

  function labelForSet(set) {
    const t = (set && set.text) || {};
    return t["date"] || t["band-name"] || "Set list";
  }

  function loadSet(key) {
    applyState(DEFAULT_STATE);              // reset first so nothing lingers from another set
    if (SETS[key]) applyState(SETS[key]);
  }

  Object.keys(SETS).forEach((key) => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = labelForSet(SETS[key]);
    picker.appendChild(opt);
  });
  picker.addEventListener("change", () => loadSet(picker.value));

  const startKey = window.DEFAULT_DATE || Object.keys(SETS)[0] || "";
  if (startKey) { picker.value = startKey; loadSet(startKey); }

  /* ---------------- Set song link ---------------- */
  function setLink(i) {
    const a = document.querySelector(`[data-title="${i}"]`);
    const current = a.getAttribute("href") === "#" ? "" : a.getAttribute("href");
    const url = prompt("Paste the link for this song (YouTube, Spotify, chart, etc.):", current);
    if (url === null) return;
    if (url.trim() === "") { a.setAttribute("href", "#"); return; }
    a.setAttribute("href", url.trim());
    a.title = "Opens: " + url.trim();
  }

  /* ---------------- Profile modal: click a photo to view it bigger ---------------- */
  const modal = document.getElementById("profileModal");
  const modalPhoto = document.getElementById("modalPhoto");
  const modalName = document.getElementById("modalName");
  const modalRole = document.getElementById("modalRole");

  function openProfile(card) {
    const photo = card.querySelector(".photo");
    modalPhoto.style.backgroundImage = photo ? photo.style.backgroundImage : "";
    modalName.textContent = card.querySelector(".name").textContent;
    modalRole.innerHTML = card.querySelector(".role").innerHTML;
    modal.classList.add("open");
  }
  function closeProfile() { modal.classList.remove("open"); }

  document.addEventListener("click", (e) => {
    const photo = e.target.closest(".photo");
    if (photo) {
      const card = photo.closest(".member");
      if (card) openProfile(card);
    }
  });
  modal.addEventListener("click", (e) => { if (e.target === modal) closeProfile(); });
  document.getElementById("modalClose").addEventListener("click", closeProfile);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeProfile(); });
</script>

<!-- Auto-scroll controller: draggable, stays in the corner, wheel sets speed -->
<div class="scroller" id="scroller" title="Scroll the number to change speed · drag ⠿ to move">
  <span class="grip" id="scrollerGrip" title="Drag to move">⠿</span>
  <button class="play" id="scrollPlay" title="Start / stop auto-scroll" aria-label="Start or stop auto-scroll">▶</button>
  <div class="speed-wrap">
    <input class="speed" id="scrollSpeed" type="number" min="1" max="300" step="1" value="6"
           title="Speed (pixels/second). 1 = super slow. Scroll your mouse wheel over this box to change it." />
    <span class="lbl">speed</span>
  </div>
</div>

<script>
  (function () {
    const panel  = document.getElementById("scroller");
    const grip   = document.getElementById("scrollerGrip");
    const play   = document.getElementById("scrollPlay");
    const speed  = document.getElementById("scrollSpeed");

    const MIN = 1, MAX = 300;               // pixels per second (1 = super slow)
    let running = false, rafId = null, lastTs = 0, carry = 0;

    function clampSpeed() {
      let v = parseFloat(speed.value);
      if (isNaN(v)) v = MIN;
      v = Math.max(MIN, Math.min(MAX, Math.round(v)));
      speed.value = v;
      return v;
    }

    function atBottom() {
      return window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 1;
    }

    function frame(ts) {
      if (!running) return;
      if (!lastTs) lastTs = ts;
      const dt = (ts - lastTs) / 1000;
      lastTs = ts;
      carry += clampSpeed() * dt;           // accumulate fractional pixels for smooth super-slow motion
      if (carry >= 1) {
        const whole = Math.floor(carry);
        window.scrollBy(0, whole);
        carry -= whole;
      }
      if (atBottom()) { stop(); return; }
      rafId = requestAnimationFrame(frame);
    }

    function start() {
      if (atBottom()) window.scrollTo(0, 0);
      running = true; lastTs = 0; carry = 0;
      play.textContent = "⏸"; play.classList.add("on");
      rafId = requestAnimationFrame(frame);
    }
    function stop() {
      running = false;
      play.textContent = "▶"; play.classList.remove("on");
      if (rafId) cancelAnimationFrame(rafId);
    }
    play.addEventListener("click", () => (running ? stop() : start()));

    // Mouse wheel over the number box adjusts speed instead of scrolling the page
    speed.addEventListener("wheel", (e) => {
      e.preventDefault();
      speed.value = (parseFloat(speed.value) || MIN) + (e.deltaY < 0 ? 1 : -1);
      clampSpeed();
    }, { passive: false });
    speed.addEventListener("change", clampSpeed);

    // Draggable — position:fixed keeps it pinned on screen wherever you scroll
    let dragging = false, offX = 0, offY = 0;
    function pt(e) { return e.touches ? e.touches[0] : e; }
    function down(e) {
      dragging = true; panel.classList.add("dragging");
      const r = panel.getBoundingClientRect(), p = pt(e);
      offX = p.clientX - r.left; offY = p.clientY - r.top;
      panel.style.right = "auto"; panel.style.bottom = "auto";
      panel.style.left = r.left + "px"; panel.style.top = r.top + "px";
      e.preventDefault();
    }
    function move(e) {
      if (!dragging) return;
      const p = pt(e);
      let x = p.clientX - offX, y = p.clientY - offY;
      x = Math.max(4, Math.min(window.innerWidth  - panel.offsetWidth  - 4, x));
      y = Math.max(4, Math.min(window.innerHeight - panel.offsetHeight - 4, y));
      panel.style.left = x + "px"; panel.style.top = y + "px";
    }
    function up() { dragging = false; panel.classList.remove("dragging"); }
    grip.addEventListener("mousedown", down);
    grip.addEventListener("touchstart", down, { passive: false });
    document.addEventListener("mousemove", move);
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("mouseup", up);
    document.addEventListener("touchend", up);
  })();
</script>
</body>
</html>
